<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>블로그 검색 노출 모니터</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://fastly.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f1ea; --paper:#fbfaf6; --card:#ffffff; --ink:#1c1b19; --muted:#6f6b63;
    --line:#e4ded1; --accent:#c2410c; --good:#15803d; --good-bg:#e7f3ea;
    --warn:#b45309; --warn-bg:#fbf0df; --bad:#b3261e; --bad-bg:#fbe9e7;
    --blue:#1d4ed8; --blue-bg:#e8eefc;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Pretendard','Pretendard Variable',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(var(--line) 0.5px,transparent 0.5px);background-size:22px 22px;}
  .wrap{max-width:1080px;margin:0 auto;padding:40px 24px 80px}

  header{border-bottom:2px solid var(--ink);padding-bottom:20px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.02em;margin:6px 0 14px}
  .meta{display:flex;flex-wrap:wrap;gap:8px 22px;font-size:13.5px;color:var(--muted)}
  .meta b{color:var(--ink);font-weight:600}
  .meta a{color:var(--accent);text-decoration:none;border-bottom:1px solid currentColor}

  .section-h{display:flex;align-items:baseline;gap:12px;margin:34px 0 14px}
  .section-h h2{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .section-h .tag{font-family:var(--mono);font-size:12px;color:var(--muted)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;position:relative;overflow:hidden;
    opacity:0;transform:translateY(10px);animation:rise .5s forwards}
  .stat .n{font-family:var(--mono);font-size:40px;font-weight:700;line-height:1}
  .stat .l{font-size:13px;color:var(--muted);margin-top:8px}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .stat.total::before{background:var(--ink)}
  .stat.ok::before{background:var(--good)} .stat.ok .n{color:var(--good)}
  .stat.miss::before{background:var(--bad)} .stat.miss .n{color:var(--bad)}

  /* 변화 */
  .changes{display:grid;gap:12px}
  .chgroup{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 8px}
  .chgroup.dropped{border-left:5px solid var(--bad);background:var(--bad-bg)}
  .chgroup.exposed{border-left:5px solid var(--good);background:var(--good-bg)}
  .chgroup.newp{border-left:5px solid var(--blue);background:var(--blue-bg)}
  .chgroup .ghead{font-size:13px;font-weight:700;padding:8px 10px 4px}
  .chgroup.dropped .ghead{color:var(--bad)} .chgroup.exposed .ghead{color:var(--good)} .chgroup.newp .ghead{color:var(--blue)}
  .chitem{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:8px 10px;font-size:14px}
  .chitem+.chitem{border-top:1px solid rgba(0,0,0,.06)}
  .chitem a{color:var(--accent);text-decoration:none;font-size:12.5px;white-space:nowrap}
  .calm{background:var(--good-bg);border:1px solid #bfe0c8;border-left:5px solid var(--good);
    border-radius:12px;padding:16px 20px;font-size:14px;color:#14532d;font-weight:500}
  .note{background:var(--paper);border:1px dashed var(--line);border-radius:12px;padding:16px 20px;font-size:13.5px;color:var(--muted)}

  /* 차트 */
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .chartcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 14px}
  .chartcard h3{font-size:14px;font-weight:700;margin-bottom:2px}
  .chartcard .sub{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .chartcard .box{position:relative;height:230px}

  /* 누락 */
  .alert{background:var(--bad-bg);border:1px solid #f2c4be;border-left:5px solid var(--bad);border-radius:12px;padding:8px 8px 4px}
  .alert.empty{background:var(--good-bg);border-color:#bfe0c8;border-left-color:var(--good);padding:16px 20px;font-size:14px;color:#14532d;font-weight:500}
  .miss-item{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 14px;border-radius:8px}
  .miss-item+.miss-item{border-top:1px solid #f2cfca}
  .miss-item .t{font-weight:600;font-size:15px} .miss-item .s{font-size:12.5px;color:var(--muted);margin-top:2px}
  .miss-item a{color:var(--accent);text-decoration:none;font-size:12.5px;white-space:nowrap}
  .kwfound{color:var(--warn);font-weight:600}

  /* 표 */
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:13px 16px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle}
  thead th{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;background:var(--paper)}
  tbody tr{opacity:0;transform:translateY(6px);animation:rise .4s forwards}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fcfbf7}
  .num{font-family:var(--mono);text-align:center;width:42px;color:var(--muted)}
  .post-t{font-weight:600;display:block}
  .post-t a{color:inherit;text-decoration:none} .post-t a:hover{color:var(--accent)}
  .kw{display:inline-block;font-size:12.5px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 8px;margin-top:4px}
  .rank{font-family:var(--mono);font-weight:700;font-size:15px;text-align:center}
  .rank small{font-weight:500;font-size:11px}
  .r-top{color:var(--good)} .r-mid{color:var(--warn)} .r-low{color:var(--ink)} .r-none{color:var(--bad)}
  .badge{display:inline-block;font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px}
  .b-ok{background:var(--good-bg);color:var(--good)} .b-miss{background:var(--bad-bg);color:var(--bad)}
  .chgtag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;margin-top:5px}
  .t-drop{background:var(--bad-bg);color:var(--bad)} .t-exp{background:var(--good-bg);color:var(--good)} .t-new{background:var(--blue-bg);color:var(--blue)}

  .srch{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .sbtn{font-size:11.5px;font-weight:600;color:#06864a;background:#eafaf0;border:1px solid #bce8cd;border-radius:6px;padding:3px 9px;text-decoration:none;white-space:nowrap;transition:background .15s}
  .sbtn:hover{background:#d4f3df}
  .sbtn .nv{color:#03c75a;font-weight:800}

  footer{margin-top:34px;font-size:12.5px;color:var(--muted);line-height:1.7;border-top:1px solid var(--line);padding-top:18px}
  .err{background:var(--warn-bg);border:1px solid #ecd3a3;border-radius:12px;padding:18px 20px;font-size:14px;color:var(--warn)}

  @keyframes rise{to{opacity:1;transform:none}}
  @media(max-width:680px){
    .stats{grid-template-columns:1fr}
    .charts{grid-template-columns:1fr}
    thead th:nth-child(4),tbody td:nth-child(4){display:none}
    .miss-item{flex-direction:column;align-items:flex-start;gap:4px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Weekly Naver SEO Monitor</div>
    <h1>블로그 검색 노출 점검</h1>
    <div class="meta" id="meta">불러오는 중…</div>
  </header>
  <div id="content"></div>
  <footer id="footer"></footer>
</div>

<script>
const rankClass = r => r==null ? 'r-none' : r<=10 ? 'r-top' : r<=30 ? 'r-mid' : 'r-low';
const rankText  = r => r==null ? '미노출' : r;
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
const nLink = q => 'https://search.naver.com/search.naver?query=' + encodeURIComponent(q);

function changesBlock(d){
  const c = d.changes || {};
  const dropped=c.dropped||[], exp=c.exposed_now||[], np=c.new_posts||[];
  // 첫 점검(비교 대상 없음)
  if(!c.compared_to && dropped.length===0 && exp.length===0 && np.length===0){
    return `<div class="note">이번이 첫 점검이라 비교할 지난 기록이 없어요. <b>다음 점검부터</b> 지난번 대비 사라진 글·새로 노출된 글이 여기에 표시됩니다.</div>`;
  }
  if(dropped.length===0 && exp.length===0 && np.length===0){
    return `<div class="calm">지난 점검과 비교해 <b>사라지거나 새로 노출된 글이 없습니다.</b> 안정적이에요. 👍</div>`;
  }
  const grp = (cls,head,arr) => arr.length? `<div class="chgroup ${cls}"><div class="ghead">${head} (${arr.length})</div>`
      + arr.map(p=>`<div class="chitem"><span>${esc(p.title)}</span><a href="${p.link}" target="_blank">글 보기 ↗</a></div>`).join('') + `</div>` : '';
  return `<div class="changes">`
    + grp('dropped','🔴 검색에서 사라진 글 — 저품질·누락 의심', dropped)
    + grp('exposed','🟢 새로 노출되기 시작한 글 — 정상 등록 확인', exp)
    + grp('newp','🆕 이번에 처음 점검된 새 글', np)
    + `</div>`;
}

function render(d, hist){
  const s = d.summary;
  document.getElementById('meta').innerHTML =
    `대상 <b><a href="${d.blog_url}" target="_blank">blog.naver.com/${d.blog_id}</a></b>`
    + `<span>마지막 점검 · <b>${d.checked_at}</b></span>`
    + `<span>순위 탐색 범위 · <b>상위 ${d.max_rank}위</b></span>`;

  const missing = d.posts.filter(p => p.title_rank == null);
  let html = '';

  // 1) 이번 주 변화
  html += `<div class="section-h"><h2>이번 점검 변화</h2><span class="tag">지난 점검 대비</span></div>`;
  html += changesBlock(d);

  // 2) 요약
  html += `<div class="stats">
    <div class="stat total"><div class="n">${s.total}</div><div class="l">점검한 글</div></div>
    <div class="stat ok"><div class="n">${s.title_exposed}</div><div class="l">검색 노출</div></div>
    <div class="stat miss"><div class="n">${s.title_missing}</div><div class="l">검색 누락</div></div>
  </div>`;

  // 3) 추세 차트
  const runs = (hist && hist.runs) ? hist.runs : [];
  html += `<div class="section-h"><h2>추세</h2><span class="tag">점검 기록 ${runs.length}회</span></div>`;
  if(runs.length===0){
    html += `<div class="note">아직 추세 그래프를 그릴 기록이 없어요. 점검이 누적될수록 주간·월간 변화가 그래프로 쌓입니다.</div>`;
  } else {
    html += `<div class="charts">
      <div class="chartcard"><h3>주간 추이</h3><div class="sub">점검할 때마다의 노출/누락 글 수</div><div class="box"><canvas id="weekChart"></canvas></div></div>
      <div class="chartcard"><h3>월간 노출률</h3><div class="sub">월별 평균 노출 비율(%)</div><div class="box"><canvas id="monthChart"></canvas></div></div>
    </div>`;
  }

  // 4) 누락 목록
  html += `<div class="section-h"><h2>누락 목록</h2><span class="tag">제목 검색에서 안 나오는 글</span></div>`;
  if(missing.length===0){
    html += `<div class="alert empty">모든 글이 제목 검색에서 정상 노출되고 있습니다. 👍</div>`;
  } else {
    html += `<div class="alert">` + missing.map(p=>{
      const kw = p.keyword_rank!=null ? `중요키워드 '${esc(p.keyword)}'로는 <span class="kwfound">${p.keyword_rank}위</span> 노출` : `중요키워드 '${esc(p.keyword)}'로도 미노출`;
      return `<div class="miss-item"><div><div class="t">${esc(p.title)}</div><div class="s">${kw}</div></div><a href="${p.link}" target="_blank">글 보기 ↗</a></div>`;
    }).join('') + `</div>`;
  }

  // 5) 전체 표
  const chgTag = c => c==='dropped'?'<span class="chgtag t-drop">▼ 사라짐</span>'
    : c==='exposed_now'?'<span class="chgtag t-exp">▲ 새 노출</span>'
    : c==='new_post'?'<span class="chgtag t-new">+ 새 글</span>':'';
  html += `<div class="section-h"><h2>전체 결과</h2><span class="tag">제목·중요키워드 검색 순위</span></div>`;
  html += `<div class="tablecard"><table><thead><tr>
      <th class="num">#</th><th>포스팅</th>
      <th style="text-align:center">제목 검색</th><th>중요 키워드</th>
      <th style="text-align:center">키워드 검색</th><th style="text-align:center">상태</th>
    </tr></thead><tbody>`;
  d.posts.forEach((p,i)=>{
    html += `<tr style="animation-delay:${i*35}ms">
      <td class="num">${i+1}</td>
      <td><span class="post-t"><a href="${p.link}" target="_blank">${esc(p.title)}</a></span>
        <div class="srch">
          <a class="sbtn" target="_blank" href="${nLink(p.title)}"><span class="nv">N</span> 제목 검색 ↗</a>
          <a class="sbtn" target="_blank" href="${nLink(p.keyword)}"><span class="nv">N</span> 키워드 검색 ↗</a>
        </div></td>
      <td class="rank ${rankClass(p.title_rank)}">${rankText(p.title_rank)}<small>${p.title_rank?'위':''}</small></td>
      <td><span class="kw">${esc(p.keyword)}</span></td>
      <td class="rank ${rankClass(p.keyword_rank)}">${rankText(p.keyword_rank)}<small>${p.keyword_rank?'위':''}</small></td>
      <td style="text-align:center"><span class="badge ${p.title_rank?'b-ok':'b-miss'}">${p.title_rank?'정상':'누락'}</span>${chgTag(p.change)?'<br>'+chgTag(p.change):''}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('footer').innerHTML =
    `※ '노출/누락'은 제목으로 네이버 블로그 검색 시 상위 ${d.max_rank}위 안에서 글을 찾았는지 여부이며, 색인 여부 판단에 신뢰도가 높습니다.<br>`
    + `※ 키워드 '순위' 숫자는 네이버 블로그 검색 API 기준의 <b>참고용 근사값</b>으로, 실제 통합검색 화면 순위와 다를 수 있습니다.<br>`
    + `※ 매주 월요일 자동 점검되며, 변화·추세는 점검이 쌓일수록 정확해집니다.`;

  if(runs.length) drawCharts(runs);
}

function drawCharts(runs){
  const ink='#1c1b19', muted='#6f6b63', grid='rgba(0,0,0,.06)';
  Chart.defaults.font.family="'Pretendard',sans-serif";
  Chart.defaults.color = muted;

  // 주간 추이
  new Chart(document.getElementById('weekChart'), {
    type:'line',
    data:{ labels: runs.map(r=>r.date.slice(5)),
      datasets:[
        {label:'노출', data:runs.map(r=>r.exposed), borderColor:'#15803d', backgroundColor:'#15803d22', tension:.3, fill:true, pointRadius:3},
        {label:'누락', data:runs.map(r=>r.missing), borderColor:'#b3261e', backgroundColor:'#b3261e22', tension:.3, fill:true, pointRadius:3},
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},
      scales:{y:{beginAtZero:true,ticks:{precision:0},grid:{color:grid}},x:{grid:{display:false}}}}
  });

  // 월간 노출률
  const byMonth={};
  runs.forEach(r=>{ const m=r.date.slice(0,7); const rate=r.total? r.exposed/r.total*100:0;
    (byMonth[m]=byMonth[m]||[]).push(rate); });
  const months=Object.keys(byMonth).sort();
  const rates=months.map(m=>Math.round(byMonth[m].reduce((a,b)=>a+b,0)/byMonth[m].length));
  new Chart(document.getElementById('monthChart'), {
    type:'bar',
    data:{ labels:months, datasets:[{label:'평균 노출률(%)', data:rates,
      backgroundColor:'#c2410c', borderRadius:6, maxBarThickness:46}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'%'}}},
      scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'},grid:{color:grid}},x:{grid:{display:false}}}}
  });
}

async function boot(){
  let data, hist=null;
  if(window.__RESULTS__){ data=window.__RESULTS__; hist=window.__HISTORY__||null; }
  else {
    data = await fetch('results.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});
    hist = await fetch('history.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null);
  }
  render(data, hist);
}
boot().catch(e=>{
  document.getElementById('meta').textContent='';
  document.getElementById('content').innerHTML =
    `<div class="err">결과 데이터(results.json)를 불러오지 못했습니다 (${e.message}).<br>`
    + `GitHub Pages 주소로 접속했는지, 점검이 한 번 이상 실행됐는지 확인해 주세요. (로컬에서 파일을 더블클릭해 여는 경우 보안정책상 안 보일 수 있습니다.)</div>`;
});
</script>
</body>
</html>
